                <h1>
                    MEC Dolores Running

    <main class="contacto">

        <section class="contact-form">

            <h2>Contactanos</h2>

            <form action="#" method="post">

                <article>
                    <label for="nombre">Nombre:</label>

                    <input type="text" id="nombre" name="nombre" placeholder="Martin" class="inname" required>
                </article>

                <article>
                    <label for="apellido">Apellido:</label>

                    <input type="text" id="apellido" name="apellido" placeholder="Garcia" class="inlas" required>
                </article>

                <article>
                    <label for="edad">Edad:</label>

                    <input type="number" id="edad" name="edad" placeholder="24" class="inage" required>
                </article>

                <article>
                    <label for="apodo">Apodo:</label>

                    <input type="text" id="apodo" name="apodo" placeholder="Correcaminos" class="insur">
                </article>

                <article>
                    <label for="email">E-Mail:</label>

                    <input type="email" id="email" name="email" placeholder="tuemail@gmail.com" class="inmail" required>
                </article>

                <article>
                    <label for="comentarios">
                        Dejanos tus comentarios:
                    </label>

                    <textarea id="comentarios" name="comentarios" placeholder="Quiero correr para MEC..."
                        class="incomments" required>
                    </textarea>
                </article>

                <article class="buttons">

                    <button type="submit" class="sub">
                        Enviar
                    </button>

                    <button type="reset" class="res">
                        Comenzar de nuevo
                    </button>

                </article>

            </form>

        </section>

        <section class="map-yt">

            <!-- MAPA -->

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13196.830701607744!2d-58.2378956!3d-33.5349002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95a5281a88e03ff1%3A0x495b77d6ea8cc577!2sDolores%2C%20Soriano!5e0!3m2!1ses-419!2suy!4v1747580000000!5m2!1ses-419!2suy"
                width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">

            </iframe>

            <!-- VIDEO -->

            <iframe width="560" height="315" src="https://open.spotify.com/playlist/6fNGb1PJeD2Wk0fDbvDucJ"
                title="Spotify playlist" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>

            </iframe>

        </section>

    </main>
